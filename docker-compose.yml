services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks: [appnet]
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./.data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  server:
    image: owl-server:prod
    env_file:
      - ./server/.prod.env
    build:
      context: .
      dockerfile: Dockerfile.server
    depends_on:
      db:
        condition: service_healthy
    networks: [appnet]
    restart: unless-stopped

  migrate:
    image: owl-server:prod
    env_file:
      - ./server/.prod.env
    depends_on:
      db:
        condition: service_healthy
    networks: [appnet]
    restart: "no"
    working_dir: /app
    command: ["npx", "prisma", "migrate", "deploy"]

  caddy:
    build:
      context: .
      dockerfile: Dockerfile.client
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - server
    networks: [appnet]
    restart: unless-stopped

networks:
  appnet:

volumes:
  pg_data:
  caddy_data:
  caddy_config: