services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks: [appnet]
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  server:
    image: owl-server:prod
    env_file:
      - ./server/.prod.env
    build:
      context: .
      dockerfile: Dockerfile.server
    depends_on:
      db:
        condition: service_healthy
    networks: [appnet]
    restart: unless-stopped

  migrate:
    image: owl-server:prod
    env_file:
      - ./server/.prod.env
    depends_on:
      db:
        condition: service_healthy
    networks: [appnet]
    restart: "no"
    working_dir: /app
    command: ["npx", "prisma", "migrate", "deploy"]

  web:
    build:
      context: .
      dockerfile: Dockerfile.client
    networks: [appnet]
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    depends_on:
      - web
      - server
    networks: [appnet]
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt

  certbot-renew:
    image: certbot/certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: /bin/sh -c
    command: >
      "trap exit TERM; while :; do
        certbot renew --webroot -w /var/www/certbot;
        sleep 12h;
      done"

networks:
  appnet: