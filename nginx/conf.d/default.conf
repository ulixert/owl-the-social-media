# nginx/conf.d/default.conf

# -------------------------
#  HTTP (80)
# -------------------------
server {
  listen 80;
  listen [::]:80;

  server_name owls-app.com www.owls-app.com;

  # Let's Encrypt challenge
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
    try_files $uri =404;
  }

  # Everything else -> HTTPS
  location / {
    return 301 https://$host$request_uri;
  }
}

# -------------------------
#  HTTPS (443)
# -------------------------
server {
  listen 443 ssl;
  listen [::]:443 ssl;

  server_name owls-app.com www.owls-app.com;

  ssl_certificate     /etc/letsencrypt/live/owls-app.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/owls-app.com/privkey.pem;

  # Good defaults
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;
  ssl_protocols TLSv1.2 TLSv1.3;

  # -------------------------
  # API -> Express
  # -------------------------
  location /api/v1/ {
    proxy_pass http://server:3000;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # -------------------------
  # SPA static site (React Router fix)
  # -------------------------
  root /usr/share/nginx/html;
  index index.html;

  # Cache static assets aggressively (optional but nice)
  location ~* \.(?:css|js|mjs|map|ico|png|jpg|jpeg|gif|svg|webp|ttf|woff|woff2)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
    try_files $uri =404;
  }

  # Everything else: serve index.html (React Router refresh fix)
  location / {
    try_files $uri $uri/ /index.html;
  }
}