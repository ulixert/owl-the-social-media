# --- HTTP: allow ACME challenge + redirect to HTTPS ---
server {
  listen 80;
  listen [::]:80;

  server_name owls-app.com www.owls-app.com;

  # Let's Encrypt challenge files
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
    try_files $uri =404;
  }

  # Everything else -> HTTPS
  location / {
    return 301 https://$host$request_uri;
  }
}

# --- HTTPS: terminate TLS + proxy to containers ---
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;

  server_name owls-app.com www.owls-app.com;

  # TLS certs (mounted from certbot volume)
  ssl_certificate     /etc/letsencrypt/live/owls-app.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/owls-app.com/privkey.pem;

  # (Optional but recommended) modern TLS settings
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  # --- API ---
  location /api/v1/ {
    proxy_pass http://server:3000;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # If you use websockets/SSE, keep these:
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }

  # --- Frontend ---
  location / {
    proxy_pass http://web:80;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# Needed for websocket header mapping used above
map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}